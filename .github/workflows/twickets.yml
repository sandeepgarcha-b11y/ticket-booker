name: twickets

# Watches Twickets for resale availability of 1536 and alerts via Telegram with
# a one-tap buy link. Each scheduled run loops internally, polling every ~30s
# for ~4.5 min; with cancel-in-progress:false a fresh run is always queued, so
# coverage is effectively continuous and near-real-time (GitHub's plain cron
# floor is 5 min — the internal loop is how we beat it). Resale sells fast.
on:
  schedule:
    - cron: "*/5 * * * *"   # relaunch the ~4.5-min polling loop
  workflow_dispatch:
    inputs:
      debug:
        description: "Diagnostic run: print findings, do not notify/persist"
        type: boolean
        default: false
      test:
        description: "Send a Telegram test message confirming the watcher is live"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: twickets
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install "requests>=2.31"
      - name: Watch
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWICKETS_TOUR_ID: ${{ vars.TWICKETS_TOUR_ID || '1921213724417335296' }}
          DEBUG: ${{ inputs.debug && '1' || '' }}
          MODE: ${{ inputs.test && 'test' || '' }}
          # Loop ~4.5 min at 30s intervals for schedule/normal runs; single-shot
          # for debug/test dispatches.
          POLL_INTERVAL: ${{ vars.TWICKETS_POLL_INTERVAL || '30' }}
          LOOP_DURATION: ${{ (inputs.debug || inputs.test) && '0' || '270' }}
        run: python twickets.py
      - name: Persist state
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && !inputs.debug && !inputs.test) }}
        run: |
          if [ -n "$(git status --porcelain twickets_state.json)" ]; then
            git config user.name "ticket-poller[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add twickets_state.json
            git commit -m "Update twickets state [skip ci]"
            git push
          else
            echo "twickets_state.json unchanged"
          fi
