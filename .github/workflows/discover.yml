name: discover

# One-off investigative run. Trigger manually from the Actions tab or via API.
# It does not notify anyone; it just prints how the ATG page exposes availability
# so the production poller can be built against the real data shape.
on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
      - name: Run discovery
        env:
          SHOW_URL: https://www.atgtickets.com/shows/1536/ambassadors-theatre/calendar/2026-06-30
        run: python discover.py
