name: discover-cos

# One-off investigative run: learn how the COS product page exposes per-size
# stock. Notifies no one. Trigger manually.
on:
  workflow_dispatch:
    inputs:
      product_url:
        description: "COS product URL to inspect"
        type: string
        default: ""

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
      - name: Run discovery
        env:
          PRODUCT_URL: ${{ inputs.product_url }}
        run: python discover_cos.py
